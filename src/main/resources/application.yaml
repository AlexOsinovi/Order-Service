server:
  port: 8082

spring:
  application:
    name: Order-Service
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: none
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  config:
    import: optional:file:.env[.properties]
  data:
    mongodb:
      database: ${MONGO_INITDB_DATABASE}
      port: 27018
      username: ${MONGO_INITDB_ROOT_USERNAME}
      password: ${MONGO_INITDB_ROOT_PASSWORD}
      authentication-database: admin
  kafka:
    bootstrap-servers: localhost:9092
    topics:
      order-events: order-domain-events
      order-deleted: order-deleted-events
      orders: orders-topic
      payments: payments-topic
    consumer:
      group-id: order-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      isolation-level: read_committed
      properties:
        spring:
          json:
            trusted:
              packages: by.osinovi.*
            type:
              mapping: paymentMsg:by.osinovi.orderservice.dto.message.PaymentMessage,orderEvent:by.osinovi.orderservice.dto.message.OrderEvent,long:java.lang.Long
            use:
              type:
                headers: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring:
          json:
            type:
              mapping: by.osinovi.orderservice.dto.message.OrderEvent:orderEvent,by.osinovi.orderservice.dto.message.OrderMessage:orderMsg,java.lang.Long:long
            add:
              type:
                headers: true
        enable:
          idempotence: true
        transactional:
          id: order-service-1

user:
  service:
    url: ${ORDER_USER_SERVICE_URL}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

